<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- 6 lotus petals at 60° intervals — simpler than 8 for crisp rendering
       at 16 px.  Path: base at (8, 8.5), tip at (8, 2). -->
  <g fill="currentColor">
    <path d="M 8 8.5 C 6.4 6.6, 6.4 3.2, 8 2 C 9.6 3.2, 9.6 6.6, 8 8.5 Z" transform="rotate(  0 8 8)"/>
    <path d="M 8 8.5 C 6.4 6.6, 6.4 3.2, 8 2 C 9.6 3.2, 9.6 6.6, 8 8.5 Z" transform="rotate( 60 8 8)"/>
    <path d="M 8 8.5 C 6.4 6.6, 6.4 3.2, 8 2 C 9.6 3.2, 9.6 6.6, 8 8.5 Z" transform="rotate(120 8 8)"/>
    <path d="M 8 8.5 C 6.4 6.6, 6.4 3.2, 8 2 C 9.6 3.2, 9.6 6.6, 8 8.5 Z" transform="rotate(180 8 8)"/>
    <path d="M 8 8.5 C 6.4 6.6, 6.4 3.2, 8 2 C 9.6 3.2, 9.6 6.6, 8 8.5 Z" transform="rotate(240 8 8)"/>
    <path d="M 8 8.5 C 6.4 6.6, 6.4 3.2, 8 2 C 9.6 3.2, 9.6 6.6, 8 8.5 Z" transform="rotate(300 8 8)"/>
  </g>
  <!-- Center -->
  <circle cx="8" cy="8" r="1.75" fill="currentColor"/>
</svg>
