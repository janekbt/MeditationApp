<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!--
    Lotus symbolic icon — outline style, currentColor.
    5 petals converging at base (8, 11.5), scaled 1:8 from the full-color icon.
    Outer petals: tip at (8, 5.5), rotated ±55°.
    Inner petals: tip at (8, 3.75), rotated ±30°.
    Center petal: tip at (8, 3.75), upright.
  -->

  <!-- Outer petals -->
  <path d="M 8 11.5 C 6.25 10.5, 6.25 7.75, 8 5.5 C 9.75 7.75, 9.75 10.5, 8 11.5 Z"
        fill="none" stroke="currentColor" stroke-width="1"
        transform="rotate(-55 8 11.5)"/>
  <path d="M 8 11.5 C 6.25 10.5, 6.25 7.75, 8 5.5 C 9.75 7.75, 9.75 10.5, 8 11.5 Z"
        fill="none" stroke="currentColor" stroke-width="1"
        transform="rotate(55 8 11.5)"/>

  <!-- Inner side petals -->
  <path d="M 8 11.5 C 5.75 10, 5.75 6.25, 8 3.75 C 10.25 6.25, 10.25 10, 8 11.5 Z"
        fill="none" stroke="currentColor" stroke-width="1"
        transform="rotate(-30 8 11.5)"/>
  <path d="M 8 11.5 C 5.75 10, 5.75 6.25, 8 3.75 C 10.25 6.25, 10.25 10, 8 11.5 Z"
        fill="none" stroke="currentColor" stroke-width="1"
        transform="rotate(30 8 11.5)"/>

  <!-- Center petal -->
  <path d="M 8 11.5 C 5.75 10, 5.75 6.25, 8 3.75 C 10.25 6.25, 10.25 10, 8 11.5 Z"
        fill="none" stroke="currentColor" stroke-width="1"/>

  <!-- Base arc -->
  <path d="M 2 11.75 Q 8 13.5 14 11.75"
        fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg>
