<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4d94e0"/>
      <stop offset="1" stop-color="#1b5fb4"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- 8 lotus petals — each is a symmetric lens shape pointing upward,
       rotated around the center (64, 64) at 45° intervals.
       Path: base at (64, 67), tip at (64, 32). -->
  <g fill="white">
    <path d="M 64 67 C 59.5 56, 59.5 40, 64 32 C 68.5 40, 68.5 56, 64 67 Z" transform="rotate(  0 64 64)"/>
    <path d="M 64 67 C 59.5 56, 59.5 40, 64 32 C 68.5 40, 68.5 56, 64 67 Z" transform="rotate( 45 64 64)"/>
    <path d="M 64 67 C 59.5 56, 59.5 40, 64 32 C 68.5 40, 68.5 56, 64 67 Z" transform="rotate( 90 64 64)"/>
    <path d="M 64 67 C 59.5 56, 59.5 40, 64 32 C 68.5 40, 68.5 56, 64 67 Z" transform="rotate(135 64 64)"/>
    <path d="M 64 67 C 59.5 56, 59.5 40, 64 32 C 68.5 40, 68.5 56, 64 67 Z" transform="rotate(180 64 64)"/>
    <path d="M 64 67 C 59.5 56, 59.5 40, 64 32 C 68.5 40, 68.5 56, 64 67 Z" transform="rotate(225 64 64)"/>
    <path d="M 64 67 C 59.5 56, 59.5 40, 64 32 C 68.5 40, 68.5 56, 64 67 Z" transform="rotate(270 64 64)"/>
    <path d="M 64 67 C 59.5 56, 59.5 40, 64 32 C 68.5 40, 68.5 56, 64 67 Z" transform="rotate(315 64 64)"/>
  </g>

  <!-- Center circle covers petal bases -->
  <circle cx="64" cy="64" r="10" fill="white"/>
</svg>
