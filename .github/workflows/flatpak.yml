name: Flatpak CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Cheap, fast-failing job: catches metainfo schema breakage before either
  # Flatpak build spends 10 minutes compiling.
  metadata:
    name: Validate metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validators
        run: sudo apt-get update && sudo apt-get install -y appstream desktop-file-utils
      - name: Validate AppStream metainfo
        run: appstreamcli validate --no-net data/io.github.janekbt.Meditate.metainfo.xml.in
      - name: Validate desktop entry
        # desktop-file-validate insists on a .desktop suffix; copy into a
        # tempdir rather than renaming the source-of-truth file.
        run: |
          tmp=$(mktemp -d)
          cp data/io.github.janekbt.Meditate.desktop.in "$tmp/io.github.janekbt.Meditate.desktop"
          desktop-file-validate "$tmp/io.github.janekbt.Meditate.desktop"

  # x86_64: job-level container runs as root — the action works out of the box.
  flatpak-x86_64:
    name: Flatpak (x86_64)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: meditate-x86_64.flatpak
          manifest-path: build-aux/io.github.janekbt.Meditate.json
          cache-key: flatpak-builder-x86_64-${{ github.sha }}

  # aarch64: QEMU binfmt must be registered on the host *before* the container
  # that needs it starts.  Job-level containers prevent running host steps first,
  # so we (1) register binfmt via a plain `docker run`, then (2) start the
  # gnome-50 container ourselves — it runs as root so runtime installs succeed.
  flatpak-aarch64:
    name: Flatpak (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Register QEMU binfmt for aarch64
        run: docker run --privileged --rm tonistiigi/binfmt --install aarch64

      - name: Build aarch64 Flatpak
        run: |
          docker run --privileged --rm \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            ghcr.io/flathub-infra/flatpak-github-actions:gnome-50 \
            bash -c '
              set -e
              flatpak remote-add --if-not-exists flathub \
                https://dl.flathub.org/repo/flathub.flatpakrepo
              xvfb-run flatpak-builder \
                --repo=repo \
                --disable-rofiles-fuse \
                --install-deps-from=flathub \
                --force-clean \
                --arch=aarch64 \
                flatpak_app \
                build-aux/io.github.janekbt.Meditate.json
              flatpak build-bundle \
                --arch=aarch64 \
                repo \
                meditate-aarch64.flatpak \
                io.github.janekbt.Meditate
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meditate-aarch64.flatpak
          path: meditate-aarch64.flatpak
