[package]
name = "meditate"
version = "26.4.1"
edition = "2021"
rust-version = "1.75"

[[bin]]
name = "meditate"
path = "src/main.rs"

[dependencies]
gtk = { package = "gtk4", version = "0.11", features = ["v4_18"] }
adw = { package = "libadwaita", version = "0.9", features = ["v1_7"] }
glib = "0.22"
gio = "0.22"
rusqlite = { version = "0.31", features = ["bundled"] }

[build-dependencies]
glib-build-tools = "0.22"

[profile.release]
opt-level = "s"
lto = true
