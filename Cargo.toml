[package]
name = "meditate"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"

[[bin]]
name = "meditate"
path = "src/main.rs"

[dependencies]
gtk4 = { version = "0.9", features = ["v4_12"] }
libadwaita = { version = "0.7", features = ["v1_6"] }
glib = "0.20"
gio = "0.20"
rusqlite = { version = "0.31", features = ["bundled"] }

[build-dependencies]
glib-build-tools = "0.20"

[profile.release]
opt-level = "s"
lto = true
